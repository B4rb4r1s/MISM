# ─────────────────────────────────────────────────────────────────────────────
# MISM base configuration  (all default values)
# Override individual keys in derived configs or via --override CLI flags.
# ─────────────────────────────────────────────────────────────────────────────

model:
  model_name:          "IlyaGusev/rut5_base_sum_gazeta"
  hidden_size:         768
  num_heads:           12
  ffn_dim:             3072
  dropout:             0.1
  window_size:         512
  window_overlap:      128
  max_windows:         32
  max_kw:              20
  kw_max_len:          32
  max_summary_tokens:  256
  max_src_len:         4096

training:
  # Stage 1: freeze encoders + decoder → train Fusion + KAL only
  stage1_epochs:        5
  stage1_lr:            1.0e-4

  # Stage 2: freeze encoders → train Fusion + KAL + Decoder
  stage2_epochs:        15
  stage2_lr:            5.0e-5

  # Per-GPU batch size  (effective = batch_size × grad_accum_steps × world_size)
  batch_size:           4
  grad_accum_steps:     8       # effective batch ≈ 4 × 8 × 8 GPUs = 256
  max_grad_norm:        1.0
  warmup_ratio:         0.05
  weight_decay:         0.01
  bf16:                 true
  gradient_checkpointing: true
  seed:                 42

loss:
  lambda_gen:           0.65
  lambda_cover:         0.15
  lambda_bert:          0.15
  lambda_gate:          0.05
  label_smoothing:      0.1
  gate_threshold:       0.3

data:
  train_path:  "dataset/splits/train.json"
  val_path:    "dataset/splits/val.json"
  test_path:   "dataset/splits/test.json"

logging:
  wandb_project:    "mism-summarization"
  wandb_run_name:   null           # auto-generated by W&B
  use_wandb:        true
  use_tensorboard:  true
  log_every_steps:  50
  eval_every_steps: 500
  save_every_steps: 1000

output:
  checkpoint_dir:  "checkpoints"
